<div class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden p-8">
        <h2 class="text-2xl font-bold text-slate-900 mb-6">Chỉnh sửa hồ sơ</h2>

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Họ và Tên</label>
                <input type="text" formControlName="name"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Chức danh</label>
                <input type="text" formControlName="role"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Giới thiệu bản thân</label>
                <textarea formControlName="bio" rows="4"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"></textarea>
            </div>


            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">URL Avatar</label>
                    <input type="text" formControlName="avatarUrl"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">URL Ảnh bìa</label>
                    <input type="text" formControlName="coverUrl"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>


            <div class="flex justify-end gap-4 pt-4 border-t border-slate-100 mt-8">
                <button type="button" (click)="cancel.emit()"
                    class="px-6 py-2 border border-slate-300 rounded-full text-slate-700 font-medium hover:bg-slate-50 transition cursor-pointer">
                    Hủy bỏ
                </button>

                <button type="submit" [disabled]="profileForm.invalid"
                    class="px-6 py-2 bg-slate-900 rounded-full text-white font-medium hover:bg-slate-800 transition disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer shadow-md">
                    Lưu thay đổi
                </button>
            </div>

        </form>
    </div>
</div>
