<div class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
    <!-- Cover Image -->
    <div class="h-48 w-full bg-cover bg-center" [style.backgroundImage]="'url(' + profile().coverUrl + ')'">
    </div>

    <div class="px-8 pb-8 relative">
      <!-- Avatar Section -->
      <div class="flex justify-between items-end -mt-16 mb-8">
        <img class="h-32 w-32 rounded-full border-4 border-white shadow-md object-cover bg-white"
          [src]="profile().avatarUrl" alt="Avatar" />
        <button (click)="editClick.emit()"
          class="bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 px-6 rounded-full transition duration-200 shadow-md cursor-pointer">
          Chỉnh sửa hồ sơ
        </button>
      </div>

      <!-- User Info -->
      <div>
        <h1 class="text-3xl font-bold text-slate-900">{{ profile().name }}</h1>
        <p class="text-lg text-slate-500 mt-1">{{ profile().role }}</p>
        <p class="text-slate-600 mt-4 max-w-2xl">
          {{ profile().bio }}
        </p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-6 mt-8 py-6 border-y border-slate-100">
        <div class="text-center">
          <span class="block text-2xl font-bold text-slate-900">{{ profile().stats.projects }}</span>
          <span class="text-sm font-medium text-slate-500 uppercase tracking-wide">Dự án</span>
        </div>
        <div class="text-center">
          <span class="block text-2xl font-bold text-slate-900">{{ profile().stats.followers / 1000 | number:'1.1-1'
            }}k</span>
          <span class="text-sm font-medium text-slate-500 uppercase tracking-wide">Followers</span>
        </div>
        <div class="text-center">
          <span class="block text-2xl font-bold text-slate-900">{{ profile().stats.rating }}</span>
          <span class="text-sm font-medium text-slate-500 uppercase tracking-wide">Đánh giá</span>
        </div>
      </div>
    </div>
  </div>
</div>
